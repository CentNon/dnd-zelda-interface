
<body class="hidden">
    <div class="top-buttons">
        <div id="buttons-container">
            <button id="toggle-count-input" onclick="toggleCountInput()" type="button" title="Settings">⚙️⬇️</button>
            <button id="reroll-all" onclick="rerollAll()" type="button" title="Reroll all dice">🔃</button>
            <button id="destroy" onclick="removeAllDice()" type="button" title="Destroy all dice">🗑️</button>
            <a class="button" id="info" href="/info" target="_blank" title="Help and info">❔</a>
        </div>
        <div id="total-container">
        </div>
    </div>
    <div id="config-container" class="hidden">
        <div>
            <label for="dice-count-input">Roll this many:</label>
            <input type="number" id="dice-count-input" value="1">
        </div>
        <div>
            <label for="custom-die-input">Add custom die:</label>
            <input type="number" id="custom-die-input" value=""><button id="add-custom-die"
                onclick="addCustomDie()">+</button>
        </div>
        <div>
            <label for="default-dice-checkbox">Enable default dice:</label>
            <input type="checkbox" id="default-dice-checkbox" checked>
        </div>        
    </div>
    <div id="dice-buttons">
        <div id="default-dice">
            <button id="d20" onclick="addDie(20)" type="button" title="Add a d20">+d20</button>
            <button id="d12" onclick="addDie(12)" type="button" title="Add a d12">+d12</button>
            <button id="d10" onclick="addDie(10)" type="button" title="Add a d10">+d10</button>
            <button id="d8" onclick="addDie(8)" type="button" title="Add a d8">+d8</button>
            <button id="d6" onclick="addDie(6)" type="button" title="Add a d6">+d6</button>
            <button id="d4" onclick="addDie(4)" type="button" title="Add a d4">+d4</button>
            <button id="d100" onclick="addDie(100)" type="button" title="Add a d100">+d100</button>
        </div>
    </div>
    <div id="dice"></div>

<script src="main.js"></script>


<style>
#erd svg { width: 100%; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    //darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  PERSONNAGE {
    string nom PK
    string taille
    boolean est_pnj
    string type
    string statut
    int niveau
    string de_vie
    int pv_actuel
    int pv_max
    int for_val
    int dex_val
    int con_val
    int int_val
    int sag_val
    int cha_val
    int perception_passive
    int rubis
    int inspiration
    string description
    url fiche_pdf
  }
  CLASSE {
    string nom PK
    string pv_niveau_1
    string pv_suivant
    string de_vie
    string jets_sauvegarde
    int nb_competences
    string description
    url fiche_aide
  }
  COMPETENCE {
    string nom PK
    string dons
    int bonus
    int bonus_par_niveau
    string description
  }
  SPECIALITE {
    string nom PK
    string effet
    string type
  }
  ARMURE {
    string nom PK
    int classe_armure
    int force_requise
    boolean desavantage_discretion
    float poids_kg
    int valeur_rubis
    string type
  }
  ARME {
    string nom PK
    string degats
    string portee
    int valeur_rubis
    float poids_kg
    string type
    string nom_degats
  }
  OBJET {
    string nom PK
    string type
    string rarete
    int prix_rubis
    string effet
    string duree
    string description
  }
  LOCALISATION {
    string nom PK
    string region
    string description
    file carte
  }
  QUETE {
    string nom PK
    string description
    string statut
    string type
    string recompense
  }
  SESSION {
    string nom PK
    date date
    string statut
    string prochain_objectif
    string description
    string titre_concatene
  }
  COMBAT {
    string nom PK
    int initiative
    int pv_depart
    int degats_recus
    int pv_restants
    string etat
  }

  PERSONNAGE }o--|| CLASSE : "appartient à"
  PERSONNAGE }o--o{ COMPETENCE : "compétences choisies"
  PERSONNAGE }o--o{ SPECIALITE : "possède"
  PERSONNAGE }o--o{ ARME : "équipe"
  PERSONNAGE }o--o{ ARMURE : "porte"
  PERSONNAGE }o--o{ OBJET : "inventaire"

  CLASSE }o--o{ ARMURE : "maîtrise armures"
  CLASSE }o--o{ ARME : "maîtrise armes"
  CLASSE }o--o{ COMPETENCE : "compétences disponibles"

  ARME }o--o{ SPECIALITE : "spécialités"

  QUETE }o--|| PERSONNAGE : "donnée par"
  QUETE }o--|| LOCALISATION : "se déroule à"
  QUETE }o--o{ OBJET : "récompense"
  QUETE ||--o{ SESSION : "avancée dans"

  SESSION }o--|| LOCALISATION : "se déroule à"
  SESSION }o--o{ PERSONNAGE : "participants"
  SESSION }o--o{ OBJET : "objets trouvés"
  SESSION ||--o{ COMBAT : "contient"

  COMBAT }o--|| PERSONNAGE : "ligne initiative"
  COMBAT }o--o{ ARME : "rollup via personnage"
  COMBAT }o--o{ ARMURE : "rollup via personnage"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
